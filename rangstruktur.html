<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rangstruktur</title>
<style>
:root{
  --bg:#F2F4F7; --surface:#FFFFFF; --ink:#1C2530; --ink-soft:#5A6B7E;
  --line:#D4DBE4; --accent:#3E6FA8; --accent-ink:#FFFFFF;
  --edge:#9FAEC0; --danger:#B0483E;
  --lvl0:#3E6FA8; --lvl1:#4E8D7C; --lvl2:#A8783E; --lvl3:#7C5FA0; --lvl4:#B05A6E; --lvl5:#5F7D5A;
  --nc0:#3E6FA8; --nc1:#4E8D7C; --nc2:#A8783E; --nc3:#7C5FA0; --nc4:#B05A6E; --nc5:#5F7D5A;
  --nc6:#33808A; --nc7:#C2622F; --nc8:#C05A8E; --nc9:#5560B8; --nc10:#8A6A52; --nc11:#66717E;
  --shadow:0 1px 3px rgba(28,37,48,.10), 0 4px 14px rgba(28,37,48,.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#151A21; --surface:#1F2630; --ink:#E4EAF1; --ink-soft:#94A3B5;
    --line:#333E4C; --accent:#6FA0D6; --accent-ink:#12161C;
    --edge:#4A5868; --danger:#D07A70;
    --lvl0:#6FA0D6; --lvl1:#72B8A3; --lvl2:#CFA064; --lvl3:#A78BC9; --lvl4:#D3808F; --lvl5:#8CAF85;
    --nc0:#6FA0D6; --nc1:#72B8A3; --nc2:#CFA064; --nc3:#A78BC9; --nc4:#D3808F; --nc5:#8CAF85;
    --nc6:#6FC4CF; --nc7:#E08B5A; --nc8:#DE8FBE; --nc9:#8F97E8; --nc10:#C09A7E; --nc11:#98A4B2;
    --shadow:0 1px 3px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--ink);
  display:flex; flex-direction:column; overflow:hidden;
  -webkit-user-select:none; user-select:none;
}
/* ── Toolbar ─────────────────────────── */
header{
  flex:0 0 auto; display:flex; align-items:center; gap:8px;
  padding:10px 14px; background:var(--surface);
  border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
header h1{
  font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  margin:0 10px 0 0; color:var(--ink);
}
header h1 span{color:var(--accent)}
.btn{
  font:inherit; font-size:13px; font-weight:500;
  padding:6px 12px; border-radius:6px; cursor:pointer;
  background:var(--surface); color:var(--ink);
  border:1px solid var(--line);
}
.btn:hover{border-color:var(--accent); color:var(--accent)}
.btn:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
.btn:disabled{opacity:.4; cursor:default; pointer-events:none}
.btn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger:hover{border-color:var(--danger); color:var(--danger)}
.btn.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
.sep{width:1px; height:22px; background:var(--line); margin:0 4px}
.spacer{flex:1}
/* Farbpalette für Textfelder */
#palette{display:flex; align-items:center; gap:5px}
#palette[hidden]{display:none}
.chip{
  width:19px; height:19px; border-radius:50%; cursor:pointer; padding:0;
  border:2px solid var(--line); background:var(--chip, var(--surface));
}
.chip:hover{border-color:var(--ink)}
/* Pfeil-Optionen */
#arrowOpts{display:flex; align-items:center; gap:4px}
#arrowOpts[hidden]{display:none}
.mini{
  font:inherit; font-size:12px; font-weight:600; line-height:1; padding:5px 9px;
  border-radius:6px; cursor:pointer;
  background:var(--surface); color:var(--ink); border:1px solid var(--line);
}
.mini:hover{border-color:var(--accent); color:var(--accent)}
.mini.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
.mini:disabled{opacity:.35; cursor:default; pointer-events:none}
#childOf{display:flex; align-items:center; gap:4px}
#childOf[hidden]{display:none}
#childOf .lbl{font-size:11px; color:var(--ink-soft); margin-right:2px}
/* ── Canvas ──────────────────────────── */
#stage{flex:1; position:relative; overflow:hidden; cursor:default; touch-action:none;
  background-image:radial-gradient(var(--line) 1px, transparent 1px);
  background-size:26px 26px;
}
#stage.panning{cursor:grabbing}
#stage.arrowmode{cursor:crosshair}
#stage.drawmode{cursor:crosshair}
#world{position:absolute; top:0; left:0; transform-origin:0 0}
#edges{position:absolute; top:0; left:0; overflow:visible; pointer-events:none}
#edges path{fill:none; stroke:var(--edge); stroke-width:1.5px}
/* ── Nodes ───────────────────────────── */
.node{
  position:absolute; display:flex; align-items:stretch;
  min-width:120px; max-width:230px;
  background:var(--surface); border:1px solid var(--line); border-radius:7px;
  box-shadow:var(--shadow); cursor:pointer;
}
.node.pair{max-width:380px}
.node .stripe{flex:0 0 4px; border-radius:6px 0 0 6px; background:var(--lvl-color,var(--accent))}
.node .divider{flex:0 0 1px; background:var(--line); margin:6px 0}
.node .body{padding:8px 12px 9px; min-width:0; flex:1}
.node .rank{
  font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--lvl-color,var(--accent)); margin-bottom:2px; white-space:nowrap;
  outline:none; min-height:1.2em;
}
.node .rank[contenteditable="true"]{cursor:text; -webkit-user-select:text; user-select:text}
.node .label{
  font-size:13.5px; font-weight:600; line-height:1.3;
  overflow-wrap:break-word; outline:none; min-height:1.3em;
}
.node .label[contenteditable="true"]{cursor:text; -webkit-user-select:text; user-select:text}
.node.selected{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), var(--shadow)}
.node.droptarget{border-color:var(--lvl1); box-shadow:0 0 0 2px var(--lvl1), var(--shadow)}
.node.dragging{opacity:.75}
.node .collapse{
  position:absolute; left:50%; bottom:-11px; transform:translateX(-50%);
  width:20px; height:20px; border-radius:50%;
  background:var(--surface); border:1px solid var(--edge); color:var(--ink-soft);
  font-size:10px; font-weight:700; line-height:18px; text-align:center;
  cursor:pointer; padding:0;
}
.node.up .collapse{bottom:auto; top:-11px}
.node .collapse:hover{border-color:var(--accent); color:var(--accent)}
/* ── Anmerkungen: Textfelder & Pfeile ── */
#anno{position:absolute; top:0; left:0; overflow:visible; pointer-events:none}
#anno .arrow{stroke:var(--accent); stroke-width:2; fill:none; marker-end:url(#ah); pointer-events:stroke; cursor:pointer}
#anno .arrow.selected{stroke-width:3}
#anno .arrow.preview{stroke-dasharray:5 4}
#anno .arrow.both{marker-start:url(#ah)}
#anno .arrow.noend{marker-end:none}
#anno .arrow.shared{pointer-events:none}
#anno marker path{fill:var(--accent); stroke:none}
#anno .handle{fill:var(--surface); stroke:var(--accent); stroke-width:1.5; pointer-events:all; cursor:move}
#notesLayer{position:absolute; top:0; left:0}
.note{
  position:absolute; background:var(--surface); border:1px dashed var(--edge); border-radius:6px;
  padding:8px 20px 14px 10px; cursor:pointer; box-shadow:var(--shadow);
}
.note .ntext{
  font-size:13px; line-height:1.4; color:var(--ink); outline:none;
  white-space:pre-wrap; overflow-wrap:break-word; width:100%; height:100%; overflow:hidden;
}
.note .ntext[contenteditable="true"]{cursor:text; -webkit-user-select:text; user-select:text}
.note.selected{box-shadow:0 0 0 2px var(--accent), var(--shadow)}
.note.droptarget{box-shadow:0 0 0 2px var(--lvl1), var(--shadow)}
.note .resize{
  position:absolute; right:2px; bottom:2px; width:14px; height:14px; cursor:nwse-resize;
  border-right:2px solid var(--edge); border-bottom:2px solid var(--edge); border-radius:0 0 4px 0;
}
.note.selected .resize{border-color:var(--accent)}
#ghost{
  position:fixed; pointer-events:none; z-index:50; display:none;
  padding:6px 12px; border-radius:6px; font-size:13px; font-weight:600;
  background:var(--accent); color:var(--accent-ink); box-shadow:var(--shadow);
  max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
/* ── Tabs (wie Excel) ─────────────────── */
#tabs{
  flex:0 0 auto; display:flex; align-items:center; gap:5px;
  padding:5px 10px; background:var(--surface); border-top:1px solid var(--line);
  overflow-x:auto;
}
.tab{
  font:inherit; font-size:12px; font-weight:500; white-space:nowrap;
  padding:4px 12px; border-radius:6px; cursor:pointer;
  background:var(--bg); color:var(--ink-soft); border:1px solid var(--line);
}
.tab:hover{border-color:var(--accent); color:var(--accent)}
.tab.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
.tab .x{margin-left:7px; opacity:.75; font-weight:700}
.tab .x:hover{opacity:1}
#bNewTab{
  font:inherit; font-size:14px; line-height:1; padding:4px 10px; cursor:pointer;
  background:var(--bg); color:var(--ink-soft); border:1px solid var(--line); border-radius:6px;
}
#bNewTab:hover{border-color:var(--accent); color:var(--accent)}
#tabHint{font-size:11px; color:var(--ink-soft); margin-left:8px; white-space:nowrap}
/* ── Footer ──────────────────────────── */
footer{
  flex:0 0 auto; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  padding:7px 14px; background:var(--surface); border-top:1px solid var(--line);
  font-size:11.5px; color:var(--ink-soft); font-variant-numeric:tabular-nums;
}
footer kbd{
  font-family:inherit; font-size:10.5px; padding:1px 5px; border-radius:4px;
  border:1px solid var(--line); background:var(--bg); color:var(--ink);
}
#stats{margin-left:auto; letter-spacing:.03em}
@media (prefers-reduced-motion: no-preference){
  .node{transition:box-shadow .12s ease, border-color .12s ease}
}
</style>
</head>
<body>

<header>
  <h1>Rang<span>struktur</span></h1>
  <button class="btn primary" id="bAddChild" title="Untergebenen hinzufügen (Tab)">+ Untergeordnet</button>
  <button class="btn" id="bAddParent" title="Übergeordneten über der Auswahl einfügen, z. B. Eltern (Shift+Tab)">+ Übergeordnet</button>
  <button class="btn" id="bAddSib" title="Gleichrangigen hinzufügen (Enter)">+ Gleichrangig</button>
  <button class="btn" id="bPartner" title="Partner auf derselben Karte hinzufügen / entfernen (z. B. Ehepaar im Stammbaum)">⚭ Partner</button>
  <span id="childOf" hidden>
    <span class="lbl">Kind von:</span>
    <button class="mini" data-of="a" title="Verbindung startet unter der linken Person">Links</button>
    <button class="mini" data-of="" title="Verbindung startet mittig (gemeinsames Kind)">Beiden</button>
    <button class="mini" data-of="b" title="Verbindung startet unter der rechten Person">Rechts</button>
  </span>
  <button class="btn danger" id="bDelete" title="Auswahl löschen (Entf)">Löschen</button>
  <div class="sep"></div>
  <button class="btn" id="bAddTree" title="Weitere, unabhängige Struktur auf dieser Fläche anlegen">+ Struktur</button>
  <button class="btn" id="bFlip" title="Baurichtung der ausgewählten Struktur umdrehen (nach oben / nach unten)">⇅ Richtung</button>
  <div class="sep"></div>
  <button class="btn" id="bNote" title="Freies Textfeld einfügen (verschieben: ziehen, Größe: Ecke unten rechts)">+ Textfeld</button>
  <button class="btn" id="bArrow" title="Pfeil verbinden: aktivieren, dann von einer Karte / einem Textfeld zum Ziel ziehen">↗ Pfeil</button>
  <button class="btn" id="bDraw" title="Pfeil frei mit der Maus malen">✏ Malen</button>
  <span id="palette" hidden>
    <button class="chip" data-c="" title="Standard"></button>
    <button class="chip" data-c="0" style="--chip:var(--nc0)" title="Blau"></button>
    <button class="chip" data-c="9" style="--chip:var(--nc9)" title="Indigo"></button>
    <button class="chip" data-c="3" style="--chip:var(--nc3)" title="Violett"></button>
    <button class="chip" data-c="8" style="--chip:var(--nc8)" title="Pink"></button>
    <button class="chip" data-c="4" style="--chip:var(--nc4)" title="Rot"></button>
    <button class="chip" data-c="7" style="--chip:var(--nc7)" title="Orange"></button>
    <button class="chip" data-c="2" style="--chip:var(--nc2)" title="Ocker"></button>
    <button class="chip" data-c="10" style="--chip:var(--nc10)" title="Braun"></button>
    <button class="chip" data-c="5" style="--chip:var(--nc5)" title="Oliv"></button>
    <button class="chip" data-c="1" style="--chip:var(--nc1)" title="Grün"></button>
    <button class="chip" data-c="6" style="--chip:var(--nc6)" title="Türkis"></button>
    <button class="chip" data-c="11" style="--chip:var(--nc11)" title="Grau"></button>
  </span>
  <span id="arrowOpts" hidden>
    <button class="mini" data-style="straight" title="Gerader Pfeil">—</button>
    <button class="mini" data-style="curve" title="Kurviger Pfeil">◠</button>
    <button class="mini" data-style="elbow" title="Winkel-Pfeil">⌐</button>
    <button class="mini" id="bBoth" title="Pfeilspitzen an beiden Enden">⇄</button>
  </span>
  <div class="spacer"></div>
  <button class="btn" id="bUndo" title="Rückgängig (Strg+Z)">↶ Rückgängig</button>
  <button class="btn" id="bFit" title="Ansicht einpassen">Einpassen</button>
  <button class="btn" id="bExport">Export JSON</button>
  <button class="btn" id="bPng" title="Aktuellen Tab als PNG-Bild speichern">PNG</button>
  <button class="btn" id="bImport">Import</button>
  <button class="btn danger" id="bNew" title="Aktuellen Tab leeren">Neu</button>
  <input type="file" id="fileIn" accept=".json,application/json" hidden>
</header>

<div id="stage">
  <div id="world">
    <svg id="edges"></svg>
    <div id="nodes"></div>
    <svg id="anno"></svg>
    <div id="notesLayer"></div>
  </div>
</div>
<div id="ghost"></div>

<div id="tabs">
  <div id="tabList" style="display:flex; gap:5px"></div>
  <button id="bNewTab" title="Neuer Tab">＋</button>
  <span id="tabHint">Doppelklick auf einen Tab: umbenennen</span>
</div>

<footer>
  <span><kbd>Klick</kbd> auswählen, nochmal klicken: bearbeiten</span>
  <span><kbd>Tab</kbd> untergeordnet</span>
  <span><kbd>Shift+Tab</kbd> übergeordnet</span>
  <span><kbd>Enter</kbd> gleichrangig</span>
  <span><kbd>Entf</kbd> löschen</span>
  <span><kbd>Ziehen</kbd> auf Karte: umhängen · ins Leere: verschieben</span>
  <span><kbd>Scrollen</kbd> zoomen</span>
  <span id="stats"></span>
</footer>

<script>
"use strict";
const STORE_KEY = "rangstruktur-v2";
const OLD_KEY = "rangstruktur-v1";
const H_GAP = 28, V_GAP = 64;

/* Arbeitsmappen-Zustand: mehrere Tabs (docs), pro Tab ein Wald aus Strukturen */
let docs = [], docIdx = 0;
let forest, notes, arrows, view;          // Aliase auf docs[docIdx]
let selectedId = null, editingId = null;
let annoSel = null, editingNoteId = null, arrowMode = false, drawMode = false;
let nodeRects = new Map();                // Weltkoordinaten sichtbarer Karten
let undoStack = [];

const $ = id => document.getElementById(id);
const stage = $("stage"), world = $("world"), nodesEl = $("nodes"), edgesEl = $("edges"), ghost = $("ghost");
const annoEl = $("anno"), notesLayer = $("notesLayer");

const uid = () => Math.random().toString(36).slice(2, 10);
const mkNode = (title, name) => ({ id: uid(), title, name, collapsed: false, children: [] });

function mkDoc(name){
  const r = mkNode("Anführer", "Name");
  return { id: uid(), name, forest: [r], notes: [], arrows: [], view: { x: 60, y: 60, k: 1 } };
}
function defaultDoc(){
  const d = mkDoc("Struktur 1");
  const r = d.forest[0];
  r.name = "Emil";
  const a = mkNode("Stellvertreter", "Name"), b = mkNode("Stellvertreter", "Name");
  a.children.push(mkNode("Mitglied", "Name"), mkNode("Mitglied", "Name"));
  b.children.push(mkNode("Mitglied", "Name"));
  r.children.push(a, b);
  return d;
}

/* Alte Speicherstände (nur "text") auf Titel+Name heben */
function migrate(n){
  if (typeof n.text === "string" && typeof n.name !== "string"){ n.name = n.text; delete n.text; }
  if (typeof n.title !== "string") n.title = "Titel";
  if (typeof n.name !== "string") n.name = "Name";
  if (n.partner && (typeof n.partner.title !== "string" || typeof n.partner.name !== "string")) delete n.partner;
  (n.children || []).forEach(migrate);
}

/* Host-Anbindung: Desktop-App speichert über Python, Browser über localStorage */
const hostApi = () => (window.pywebview && window.pywebview.api) || null;

/* ── Baum-Hilfen (über alle Strukturen des Tabs) ── */
function findIn(n, id){
  if (n.id === id) return n;
  for (const c of n.children){ const f = findIn(c, id); if (f) return f; }
  return null;
}
function findNode(id){
  for (const t of forest){ const f = findIn(t, id); if (f) return f; }
  return null;
}
function findParentIn(n, id){
  for (const c of n.children){
    if (c.id === id) return n;
    const f = findParentIn(c, id); if (f) return f;
  }
  return null;
}
function findParent(id){
  for (const t of forest){
    if (t.id === id) return null;
    const f = findParentIn(t, id); if (f) return f;
  }
  return null;
}
function treeOf(id){
  for (const t of forest){ if (findIn(t, id)) return t; }
  return null;
}
const isRoot = id => forest.some(t => t.id === id);
function isDescendant(maybeChildId, ancestor){
  if (ancestor.id === maybeChildId) return true;
  return ancestor.children.some(c => isDescendant(maybeChildId, c));
}
function countNodes(n){ return 1 + n.children.reduce((s,c) => s + countNodes(c), 0); }
function countAll(){ return forest.reduce((s,t) => s + countNodes(t), 0); }
function maxDepth(n, d = 1){ return n.children.length ? Math.max(...n.children.map(c => maxDepth(c, d+1))) : d; }

/* ── Persistenz / Undo ── */
function save(){
  const text = JSON.stringify({ version: 2, active: docIdx, docs });
  const api = hostApi();
  if (api){ api.save_data(text).catch(() => {}); }
  else { try { localStorage.setItem(STORE_KEY, text); } catch(e){} }
}
function pushUndo(){
  undoStack.push({ i: docIdx, s: JSON.stringify({ forest, notes, arrows }) });
  if (undoStack.length > 100) undoStack.shift();
  $("bUndo").disabled = false;
}
function undo(){
  if (!undoStack.length) return;
  const u = undoStack.pop();
  if (u.i !== docIdx && docs[u.i]) activate(u.i);
  const s = JSON.parse(u.s);
  docs[docIdx].forest = forest = s.forest;
  docs[docIdx].notes = notes = s.notes || [];
  docs[docIdx].arrows = arrows = s.arrows || [];
  if (selectedId && !findNode(selectedId)) selectedId = forest[0].id;
  if (annoSel && !findNote(annoSel.id) && !findArrow(annoSel.id)) setAnnoSel(null);
  $("bUndo").disabled = !undoStack.length;
  render(); save();
}

/* ── Tabs ── */
function activate(i){
  docIdx = Math.max(0, Math.min(i, docs.length - 1));
  const d = docs[docIdx];
  forest = d.forest; notes = d.notes; arrows = d.arrows; view = d.view;
  selectedId = forest[0] ? forest[0].id : null;
  annoSel = null; editingId = null; editingNoteId = null;
  setArrowMode(false);
  render(); renderTabs(); applyView();
}
function renderTabs(){
  const list = $("tabList");
  list.innerHTML = "";
  docs.forEach((d, i) => {
    const b = document.createElement("button");
    b.className = "tab" + (i === docIdx ? " active" : "");
    b.textContent = d.name;
    if (i === docIdx && docs.length > 1){
      const x = document.createElement("span");
      x.className = "x";
      x.textContent = "×";
      x.title = "Tab schließen";
      x.addEventListener("click", e => {
        e.stopPropagation();
        if (!confirm(`Tab "${d.name}" mit allem Inhalt löschen?`)) return;
        docs.splice(i, 1);
        undoStack = undoStack.filter(u => u.i !== i).map(u => u.i > i ? { i: u.i - 1, s: u.s } : u);
        $("bUndo").disabled = !undoStack.length;
        activate(Math.max(0, i - 1));
        save();
      });
      b.appendChild(x);
    }
    b.addEventListener("click", () => { if (i !== docIdx){ activate(i); save(); } });
    b.addEventListener("dblclick", () => {
      const name = prompt("Name der Struktur:", d.name);
      if (name && name.trim()){ d.name = name.trim(); renderTabs(); save(); }
    });
    list.appendChild(b);
  });
}

/* ── Layout & Rendern (alle Strukturen des Tabs) ── */
function render(){
  nodesEl.innerHTML = "";
  const els = new Map();
  forest.forEach(tree => {
    const up = tree.dir === "up";
    (function build(n, depth){
      const el = document.createElement("div");
      el.className = "node" + (up ? " up" : "") + (n.partner ? " pair" : "");
      el.dataset.id = n.id;
      el.style.setProperty("--lvl-color", `var(--lvl${depth % 6})`);
      if (n.id === selectedId) el.classList.add("selected");
      el.innerHTML = `<div class="stripe"></div><div class="body"><div class="rank" data-field="title"></div><div class="label" data-field="name"></div></div>`
        + (n.partner ? `<div class="divider"></div><div class="body"><div class="rank" data-field="ptitle"></div><div class="label" data-field="pname"></div></div>` : "");
      el.querySelector('[data-field="title"]').textContent = n.title;
      el.querySelector('[data-field="name"]').textContent = n.name;
      if (n.partner){
        el.querySelector('[data-field="ptitle"]').textContent = n.partner.title;
        el.querySelector('[data-field="pname"]').textContent = n.partner.name;
      }
      if (n.children.length){
        const btn = document.createElement("button");
        btn.className = "collapse";
        btn.textContent = n.collapsed ? n.children.length : "–";
        btn.title = n.collapsed ? "Zweig aufklappen" : "Zweig einklappen";
        btn.addEventListener("pointerdown", e => e.stopPropagation());
        btn.addEventListener("click", e => {
          e.stopPropagation();
          n.collapsed = !n.collapsed;
          render(); save();
        });
        el.appendChild(btn);
      }
      nodesEl.appendChild(el);
      els.set(n.id, el);
      if (!n.collapsed) n.children.forEach(c => build(c, depth + 1));
    })(tree, 0);
  });

  // Messen
  const size = new Map();
  els.forEach((el, id) => size.set(id, { w: el.offsetWidth, h: el.offsetHeight }));

  nodeRects = new Map();
  let paths = "";
  forest.forEach(tree => {
    const up = tree.dir === "up";
    // Zeilenhöhen dieser Struktur
    const levelH = [];
    (function depths(n, d){
      if (!els.has(n.id)) return;
      levelH[d] = Math.max(levelH[d] || 0, size.get(n.id).h);
      if (!n.collapsed) n.children.forEach(c => depths(c, d + 1));
    })(tree, 0);
    const levelY = [0];
    for (let i = 1; i < levelH.length; i++) levelY[i] = levelY[i-1] + levelH[i-1] + V_GAP;

    // Teilbaum-Breiten
    const subW = new Map();
    (function widths(n){
      const own = size.get(n.id).w;
      if (n.collapsed || !n.children.length){ subW.set(n.id, own); return own; }
      let sum = 0;
      n.children.forEach((c, i) => { sum += widths(c) + (i ? H_GAP : 0); });
      const w = Math.max(own, sum);
      subW.set(n.id, w);
      return w;
    })(tree);

    // Positionen (mit manuellen Versätzen ox/oy, die auf den Teilbaum vererbt werden)
    const treeIds = [];
    (function place(n, x, d, ax, ay){
      const ox = ax + (n.ox || 0), oy = ay + (n.oy || 0);
      const w = subW.get(n.id), own = size.get(n.id);
      nodeRects.set(n.id, { x: x + (w - own.w) / 2 + ox, y: levelY[d] + oy, w: own.w, h: own.h });
      treeIds.push(n.id);
      if (n.collapsed || !n.children.length) return;
      let cx = x + (w - (n.children.reduce((s,c,i) => s + subW.get(c.id) + (i ? H_GAP : 0), 0))) / 2;
      n.children.forEach(c => { place(c, cx, d + 1, ox, oy); cx += subW.get(c.id) + H_GAP; });
    })(tree, 0, 0, 0, 0);

    // Nach oben bauende Struktur: vertikal spiegeln
    if (up && treeIds.length){
      let tMin = Infinity, tMax = -Infinity;
      treeIds.forEach(id => { const p = nodeRects.get(id); tMin = Math.min(tMin, p.y); tMax = Math.max(tMax, p.y + p.h); });
      treeIds.forEach(id => { const p = nodeRects.get(id); p.y = tMin + tMax - (p.y + p.h); });
    }

    // Verbinder
    (function edges(n){
      if (n.collapsed) return;
      const p = nodeRects.get(n.id);
      n.children.forEach(c => {
        const q = nodeRects.get(c.id);
        if (p && q){
          // Bei Paar-Karten: Linie startet unter der zuständigen Person
          const frac = n.partner ? (c.of === "a" ? 0.25 : c.of === "b" ? 0.75 : 0.5) : 0.5;
          const x1 = p.x + p.w * frac, x2 = q.x + q.w / 2;
          const y1 = up ? p.y : p.y + p.h;
          const y2 = up ? q.y + q.h : q.y;
          const my = y1 + (y2 - y1) / 2;
          paths += `<path d="M ${x1} ${y1} L ${x1} ${my} L ${x2} ${my} L ${x2} ${y2}"/>`;
        }
        edges(c);
      });
    })(tree);
  });

  els.forEach((el, id) => {
    const p = nodeRects.get(id);
    el.style.left = p.x + "px";
    el.style.top = p.y + "px";
  });
  edgesEl.setAttribute("width", 10);
  edgesEl.setAttribute("height", 10);
  edgesEl.innerHTML = paths;

  const deepest = Math.max(...forest.map(t => maxDepth(t)));
  $("stats").textContent = countAll() + " Positionen · " + forest.length + (forest.length === 1 ? " Struktur · " : " Strukturen · ") + deepest + " Ebenen";
  updateButtons();
  renderAnno();
}

function updateButtons(){
  const rootSel = selectedId && isRoot(selectedId);
  $("bDelete").disabled = annoSel ? false : (!selectedId || (rootSel && forest.length < 2));
  $("bAddSib").disabled = !selectedId || rootSel;
  $("bFlip").disabled = !selectedId;
  $("bAddParent").disabled = !selectedId;
  const selNode = selectedId ? findNode(selectedId) : null;
  $("bPartner").disabled = !selNode;
  $("bPartner").textContent = selNode && selNode.partner ? "⚭ Partner entfernen" : "⚭ Partner";
  // "Kind von": nur zeigen, wenn der Vorgesetzte eine Paar-Karte ist
  const par = selectedId ? findParent(selectedId) : null;
  const showOf = !!(par && par.partner && selNode);
  $("childOf").hidden = !showOf;
  if (showOf){
    const cur = selNode.of || "";
    document.querySelectorAll("#childOf .mini").forEach(b =>
      b.classList.toggle("on", (b.dataset.of || "") === cur));
  }
}

function contentBounds(){
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const grow = (x, y, w, h) => {
    minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w); maxY = Math.max(maxY, y + h);
  };
  nodeRects.forEach(r => grow(r.x, r.y, r.w, r.h));
  notes.forEach(n => grow(n.x, n.y, n.w, n.h));
  arrows.forEach(a => {
    if (a.pts){ a.pts.forEach(q => grow(q[0], q[1], 0, 0)); }
    else if (!a.from){ grow(a.x1, a.y1, 0, 0); grow(a.x2, a.y2, 0, 0); }
  });
  return isFinite(minX) ? { minX, minY, maxX, maxY } : null;
}
function applyView(){
  world.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.k})`;
}
function fitView(){
  const b = contentBounds();
  if (!b) return;
  const w = b.maxX - b.minX, h = b.maxY - b.minY;
  const sw = stage.clientWidth, sh = stage.clientHeight;
  view.k = Math.min(1.25, Math.max(0.12, Math.min((sw - 80) / Math.max(w, 1), (sh - 80) / Math.max(h, 1))));
  view.x = (sw - w * view.k) / 2 - b.minX * view.k;
  view.y = (sh - h * view.k) / 2 - b.minY * view.k;
  applyView(); save();
}

/* ── Aktionen: Karten ── */
function select(id){
  selectedId = id;
  nodesEl.querySelectorAll(".node").forEach(el =>
    el.classList.toggle("selected", el.dataset.id === id));
  updateButtons();
}
function addChild(){
  const n = selectedId ? findNode(selectedId) : forest[0];
  if (!n) return;
  pushUndo();
  const c = mkNode("Titel", "Name");
  n.collapsed = false;
  n.children.push(c);
  selectedId = c.id;
  render(); save();
  startEdit(c.id, "title");
}
function addSibling(){
  if (!selectedId || isRoot(selectedId)) return;
  const parent = findParent(selectedId);
  if (!parent) return;
  pushUndo();
  const c = mkNode("Titel", "Name");
  const i = parent.children.findIndex(x => x.id === selectedId);
  parent.children.splice(i + 1, 0, c);
  selectedId = c.id;
  render(); save();
  startEdit(c.id, "title");
}
function addParent(){
  if (!selectedId) return;
  const n = findNode(selectedId);
  if (!n) return;
  pushUndo();
  const p = mkNode("Titel", "Name");
  const parent = findParent(selectedId);
  if (parent){
    // Zwischen Auswahl und bisherigem Vorgesetzten einketten
    const i = parent.children.findIndex(c => c.id === n.id);
    parent.children[i] = p;
  } else {
    // Auswahl ist eine Wurzel: neue Karte wird neue Spitze der Struktur
    const i = forest.findIndex(t => t.id === n.id);
    forest[i] = p;
    if (n.dir){ p.dir = n.dir; delete n.dir; }
  }
  if (n.ox){ p.ox = n.ox; n.ox = 0; }
  if (n.oy){ p.oy = n.oy; n.oy = 0; }
  p.children.push(n);
  selectedId = p.id;
  render(); save();
  startEdit(p.id, "title");
}
function deleteSelected(){
  if (!selectedId) return;
  const n = findNode(selectedId);
  if (!n) return;
  const sub = countNodes(n);
  if (isRoot(selectedId)){
    if (forest.length < 2) return;
    if (!confirm(`Diese komplette Struktur mit ${sub} Positionen löschen?`)) return;
    pushUndo();
    forest.splice(forest.findIndex(t => t.id === selectedId), 1);
    selectedId = forest[0].id;
  } else {
    if (sub > 1 && !confirm(`Diesen Zweig mit ${sub} Positionen löschen?`)) return;
    pushUndo();
    const parent = findParent(selectedId);
    parent.children = parent.children.filter(c => c.id !== selectedId);
    selectedId = parent.id;
  }
  render(); save();
}
function addTree(){
  pushUndo();
  const r = mkNode("Anführer", "Name");
  const b = contentBounds();
  if (b) r.ox = b.maxX + 120;
  forest.push(r);
  selectedId = r.id;
  render(); save();
  startEdit(r.id, "title");
}
function flipTree(){
  if (!selectedId) return;
  const tree = treeOf(selectedId);
  if (!tree) return;
  pushUndo();
  tree.dir = tree.dir === "up" ? "down" : "up";
  render(); save();
}

/* ── Titel/Name bearbeiten ── */
function fieldEl(id, field){
  return nodesEl.querySelector(`.node[data-id="${id}"] [data-field="${field}"]`);
}
function focusField(id, field){
  const el = fieldEl(id, field);
  if (!el) return;
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = getSelection();
  sel.removeAllRanges(); sel.addRange(range);
}
function startEdit(id, field){
  const els = nodesEl.querySelectorAll(`.node[data-id="${id}"] [data-field]`);
  if (!els.length) return;
  editingId = id;
  els.forEach(el => el.contentEditable = "true");
  focusField(id, field || "title");
}
function finishEdit(commit){
  if (!editingId) return;
  const n = findNode(editingId);
  const id = editingId;
  editingId = null;
  const els = nodesEl.querySelectorAll(`.node[data-id="${id}"] [data-field]`);
  if (n && els.length){
    const val = {};
    els.forEach(el => { val[el.dataset.field] = el.textContent.trim(); });
    if (commit){
      const changed =
        (val.title && val.title !== n.title) || (val.name && val.name !== n.name) ||
        (n.partner && ((val.ptitle && val.ptitle !== n.partner.title) || (val.pname && val.pname !== n.partner.name)));
      if (changed){
        pushUndo();
        if (val.title) n.title = val.title;
        if (val.name) n.name = val.name;
        if (n.partner){
          if (val.ptitle) n.partner.title = val.ptitle;
          if (val.pname) n.partner.name = val.pname;
        }
      }
    }
    els.forEach(el => el.contentEditable = "false");
  }
  render(); save();
  select(id);
}
function togglePartner(){
  if (!selectedId) return;
  const n = findNode(selectedId);
  if (!n) return;
  if (n.partner){
    if (!confirm("Partner von dieser Karte entfernen?")) return;
    pushUndo();
    delete n.partner;
    render(); save();
  } else {
    pushUndo();
    n.partner = { title: "Partner", name: "Name" };
    render(); save();
    startEdit(n.id, "ptitle");
  }
}

/* ── Textfelder & Pfeile ── */
const findNote = id => notes.find(n => n.id === id);
const findArrow = id => arrows.find(a => a.id === id);

function anchorRect(ref){
  if (ref.type === "node"){
    if (!findNode(ref.id)) return undefined;
    return nodeRects.get(ref.id) || null;
  }
  const nt = findNote(ref.id);
  return nt ? { x: nt.x, y: nt.y, w: nt.w, h: nt.h } : undefined;
}
function edgePoint(rect, tx, ty){
  const cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
  const dx = tx - cx, dy = ty - cy;
  if (!dx && !dy) return { x: cx, y: cy };
  const sx = dx ? (rect.w / 2) / Math.abs(dx) : Infinity;
  const sy = dy ? (rect.h / 2) / Math.abs(dy) : Infinity;
  const s = Math.min(sx, sy);
  return { x: cx + dx * s, y: cy + dy * s };
}
/* ── Pfeil-Geometrie: Anker, Ausweichen, Zusammenführen ── */
function anchorPt(rect, an){
  return { x: rect.x + an.rx * rect.w, y: rect.y + an.ry * rect.h };
}
function projectToBorder(rect, x, y){
  const px = Math.max(rect.x, Math.min(rect.x + rect.w, x));
  const py = Math.max(rect.y, Math.min(rect.y + rect.h, y));
  const dl = px - rect.x, dr = rect.x + rect.w - px;
  const dt = py - rect.y, db = rect.y + rect.h - py;
  const m = Math.min(dl, dr, dt, db);
  let bx = px, by = py;
  if (m === dl) bx = rect.x;
  else if (m === dr) bx = rect.x + rect.w;
  else if (m === dt) by = rect.y;
  else by = rect.y + rect.h;
  return { rx: (bx - rect.x) / rect.w, ry: (by - rect.y) / rect.h };
}
function quadPts(p1, c, p2, n = 20){
  const pts = [];
  for (let i = 0; i <= n; i++){
    const t = i / n, u = 1 - t;
    pts.push([u*u*p1.x + 2*u*t*c.x + t*t*p2.x, u*u*p1.y + 2*u*t*c.y + t*t*p2.y]);
  }
  return pts;
}
function ctrlFor(p1, p2, bend){
  const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.hypot(dx, dy) || 1;
  return { x: (p1.x + p2.x) / 2 - dy / len * bend, y: (p1.y + p2.y) / 2 + dx / len * bend };
}
function segBlocked(x1, y1, x2, y2, rects){
  const len = Math.hypot(x2 - x1, y2 - y1);
  const steps = Math.max(2, Math.ceil(len / 10));
  for (let i = 0; i <= steps; i++){
    const t = i / steps, x = x1 + (x2 - x1) * t, y = y1 + (y2 - y1) * t;
    for (const r of rects){
      if (x > r.x - 4 && x < r.x + r.w + 4 && y > r.y - 4 && y < r.y + r.h + 4) return true;
    }
  }
  return false;
}
function ptsBlocked(pts, rects){
  for (let i = 1; i < pts.length; i++){
    if (segBlocked(pts[i-1][0], pts[i-1][1], pts[i][0], pts[i][1], rects)) return true;
  }
  return false;
}
function obstaclesFor(excludeIds){
  const out = [];
  nodeRects.forEach((r, id) => { if (!excludeIds.has(id)) out.push(r); });
  notes.forEach(nt => { if (!excludeIds.has(nt.id)) out.push({ x: nt.x, y: nt.y, w: nt.w, h: nt.h }); });
  return out;
}
/* Weg zwischen zwei Punkten suchen, der Karten und Textfelder umgeht */
function routeSeg(p1, p2, style, obstacles){
  const len = Math.hypot(p2.x - p1.x, p2.y - p1.y) || 1;
  const base = Math.min(60, len * 0.25);
  const cands = style === "curve"
    ? [base, -base, base * 1.8, -base * 1.8, base * 2.6, -base * 2.6]
    : [0, base, -base, base * 1.8, -base * 1.8, base * 2.6, -base * 2.6];
  for (const b of cands){
    const pts = b ? quadPts(p1, ctrlFor(p1, p2, b), p2) : [[p1.x, p1.y], [p2.x, p2.y]];
    if (!ptsBlocked(pts, obstacles)) return pts;
  }
  const b0 = style === "curve" ? base : 0;
  return b0 ? quadPts(p1, ctrlFor(p1, p2, b0), p2) : [[p1.x, p1.y], [p2.x, p2.y]];
}
function elbowPts(p1, p2){
  if (Math.abs(p2.y - p1.y) >= Math.abs(p2.x - p1.x)){
    const my = (p1.y + p2.y) / 2;
    return [[p1.x, p1.y], [p1.x, my], [p2.x, my], [p2.x, p2.y]];
  }
  const mx = (p1.x + p2.x) / 2;
  return [[p1.x, p1.y], [mx, p1.y], [mx, p2.y], [p2.x, p2.y]];
}
function trimPts(pts, startTrim, endTrim){
  const cut = (arr, amount) => {
    let rest = amount;
    while (arr.length > 1 && rest > 0){
      const [ax, ay] = arr[0], [bx, by] = arr[1];
      const d = Math.hypot(bx - ax, by - ay);
      if (d <= rest){ arr.shift(); rest -= d; }
      else {
        const t = rest / d;
        arr[0] = [ax + (bx - ax) * t, ay + (by - ay) * t];
        rest = 0;
      }
    }
  };
  const p = pts.map(q => [q[0], q[1]]);
  cut(p, startTrim);
  p.reverse(); cut(p, endTrim); p.reverse();
  return p;
}
/* Alle Pfeile in Linienzüge übersetzen (für Bildschirm und PNG identisch).
   Pfeile mit gemeinsamem Ziel laufen vor dem Ziel zusammen (eine Spitze). */
function arrowShapes(){
  const shapes = [];
  const groups = new Map();
  arrows.forEach(a => {
    if (!a.from || a.both || a.toAnchor || a.style === "draw") return;
    const k = a.to.type + ":" + a.to.id;
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(a);
  });
  const merged = new Set();
  groups.forEach(list => {
    if (list.length < 2) return;
    const rb = anchorRect(list[0].to);
    if (!rb) return;
    const items = [];
    list.forEach(a => {
      const ra = anchorRect(a.from);
      if (!ra) return;
      const p1 = a.fromAnchor ? anchorPt(ra, a.fromAnchor)
        : edgePoint(ra, rb.x + rb.w / 2, rb.y + rb.h / 2);
      items.push({ a, p1 });
    });
    if (items.length < 2) return;
    const avg = { x: items.reduce((s, i) => s + i.p1.x, 0) / items.length,
                  y: items.reduce((s, i) => s + i.p1.y, 0) / items.length };
    const pB = edgePoint(rb, avg.x, avg.y);
    const dl = Math.hypot(avg.x - pB.x, avg.y - pB.y) || 1;
    const J = { x: pB.x + (avg.x - pB.x) / dl * 34, y: pB.y + (avg.y - pB.y) / dl * 34 };
    items.forEach(({ a, p1 }) => {
      merged.add(a.id);
      const obstacles = obstaclesFor(new Set([a.from.id, a.to.id]));
      let pts = a.style === "elbow" ? elbowPts(p1, J) : routeSeg(p1, J, a.style, obstacles);
      pts = trimPts(pts, 5, 0);
      shapes.push({ id: a.id, pts, headEnd: false, headStart: false,
                    handleFrom: pts[0], handleTo: [pB.x, pB.y] });
    });
    shapes.push({ id: null, pts: trimPts([[J.x, J.y], [pB.x, pB.y]], 0, 7),
                  headEnd: true, headStart: false, shared: true });
  });
  arrows.forEach(a => {
    if (a.from && merged.has(a.id)) return;
    if (a.pts){
      shapes.push({ id: a.id, pts: a.pts, headEnd: true, headStart: !!a.both });
      return;
    }
    if (!a.from){
      shapes.push({ id: a.id, pts: [[a.x1, a.y1], [a.x2, a.y2]], headEnd: true, headStart: !!a.both, legacy: true });
      return;
    }
    const ra = anchorRect(a.from), rb = anchorRect(a.to);
    if (!ra || !rb) return;
    const refA = a.fromAnchor ? anchorPt(ra, a.fromAnchor) : null;
    const refB = a.toAnchor ? anchorPt(rb, a.toAnchor) : null;
    const cA = refA || { x: ra.x + ra.w / 2, y: ra.y + ra.h / 2 };
    const cB = refB || { x: rb.x + rb.w / 2, y: rb.y + rb.h / 2 };
    const p1 = refA || edgePoint(ra, cB.x, cB.y);
    const p2 = refB || edgePoint(rb, cA.x, cA.y);
    if (Math.hypot(p2.x - p1.x, p2.y - p1.y) < 14) return;
    const obstacles = obstaclesFor(new Set([a.from.id, a.to.id]));
    let pts = a.style === "elbow" ? elbowPts(p1, p2) : routeSeg(p1, p2, a.style, obstacles);
    pts = trimPts(pts, a.both ? 7 : 5, 7);
    shapes.push({ id: a.id, pts, headEnd: true, headStart: !!a.both,
                  handleFrom: pts[0], handleTo: pts[pts.length - 1] });
  });
  return shapes;
}

function renderAnno(){
  notesLayer.innerHTML = "";
  notes.forEach(nt => {
    const sel = annoSel && annoSel.type === "note" && annoSel.id === nt.id;
    const el = document.createElement("div");
    el.className = "note" + (sel ? " selected" : "");
    el.dataset.id = nt.id;
    el.style.left = nt.x + "px";
    el.style.top = nt.y + "px";
    el.style.width = nt.w + "px";
    el.style.height = nt.h + "px";
    if (nt.c != null){
      const col = `var(--nc${nt.c})`;
      el.style.borderColor = col;
      el.style.borderStyle = "solid";
      el.style.background = `color-mix(in srgb, ${col} 14%, var(--surface))`;
    }
    const tx = document.createElement("div");
    tx.className = "ntext";
    tx.textContent = nt.text;
    el.appendChild(tx);
    const rs = document.createElement("div");
    rs.className = "resize";
    if (nt.c != null) rs.style.borderColor = `var(--nc${nt.c})`;
    el.appendChild(rs);
    notesLayer.appendChild(el);
  });
  // Verwaiste Verbindungen entfernen (Karte oder Textfeld wurde gelöscht)
  const kept = arrows.filter(a => !a.from ||
    (anchorRect(a.from) !== undefined && anchorRect(a.to) !== undefined));
  if (kept.length !== arrows.length){ docs[docIdx].arrows = arrows = kept; }
  let svg = `<defs><marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 9 5 L 0 9 z"/></marker></defs>`;
  const toD = pts => "M " + pts.map(p => p[0] + " " + p[1]).join(" L ");
  arrowShapes().forEach(s => {
    if (s.shared){
      svg += `<path class="arrow shared" d="${toD(s.pts)}"/>`;
      return;
    }
    const sel = annoSel && annoSel.type === "arrow" && annoSel.id === s.id;
    svg += `<path class="arrow${sel ? " selected" : ""}${s.headStart ? " both" : ""}${s.headEnd ? "" : " noend"}" data-id="${s.id}" d="${toD(s.pts)}"/>`;
    if (sel){
      const a = findArrow(s.id);
      if (a && a.from){
        svg += `<circle class="handle" data-id="${a.id}" data-end="from" cx="${s.handleFrom[0]}" cy="${s.handleFrom[1]}" r="6"/>`;
        svg += `<circle class="handle" data-id="${a.id}" data-end="to" cx="${s.handleTo[0]}" cy="${s.handleTo[1]}" r="6"/>`;
      } else if (a && !a.pts){
        svg += `<circle class="handle" data-id="${a.id}" data-end="1" cx="${s.pts[0][0]}" cy="${s.pts[0][1]}" r="6"/>`;
        svg += `<circle class="handle" data-id="${a.id}" data-end="2" cx="${s.pts[1][0]}" cy="${s.pts[1][1]}" r="6"/>`;
      }
    }
  });
  if (drag && drag.bind && drag.cur){
    const ra = anchorRect(drag.bind);
    if (ra){
      const p1 = edgePoint(ra, drag.cur.x, drag.cur.y);
      svg += `<path class="arrow preview" d="M ${p1.x} ${p1.y} L ${drag.cur.x} ${drag.cur.y}"/>`;
    }
  }
  if (drag && drag.rebind && drag.cur){
    const a = findArrow(drag.rebind);
    if (a){
      const orect = anchorRect(drag.end === "from" ? a.to : a.from);
      if (orect){
        const anch = drag.end === "from" ? a.toAnchor : a.fromAnchor;
        const p0 = anch ? anchorPt(orect, anch) : edgePoint(orect, drag.cur.x, drag.cur.y);
        svg += `<path class="arrow preview" d="M ${p0.x} ${p0.y} L ${drag.cur.x} ${drag.cur.y}"/>`;
      }
    }
  }
  if (drag && drag.draw && drag.pts && drag.pts.length > 1){
    svg += `<path class="arrow preview" d="${toD(drag.pts)}"/>`;
  }
  annoEl.innerHTML = svg;
}
function setAnnoSel(sel){
  annoSel = sel;
  $("palette").hidden = !(sel && sel.type === "note");
  $("arrowOpts").hidden = !(sel && sel.type === "arrow");
  if (sel && sel.type === "arrow") updateArrowOpts();
  if (sel) select(null); else select(selectedId);
  renderAnno();
}
function updateArrowOpts(){
  const a = annoSel && annoSel.type === "arrow" ? findArrow(annoSel.id) : null;
  if (!a) return;
  const isDraw = !!a.pts;
  const st = a.style || "straight";
  document.querySelectorAll("#arrowOpts .mini[data-style]").forEach(b => {
    b.disabled = isDraw; // gemalte Pfeile behalten ihre Form
    b.classList.toggle("on", !isDraw && b.dataset.style === st);
  });
  $("bBoth").classList.toggle("on", !!a.both);
}
function deleteAnno(){
  if (!annoSel) return;
  pushUndo();
  if (annoSel.type === "note") docs[docIdx].notes = notes = notes.filter(n => n.id !== annoSel.id);
  else docs[docIdx].arrows = arrows = arrows.filter(a => a.id !== annoSel.id);
  setAnnoSel(null);
  renderAnno(); save();
}
function addNote(){
  pushUndo();
  const r = stage.getBoundingClientRect();
  const c = toWorld(r.left + r.width / 2, r.top + r.height / 2);
  const nt = { id: uid(), x: c.x - 90, y: c.y - 40, w: 180, h: 80, text: "Notiz" };
  notes.push(nt);
  setAnnoSel({ type: "note", id: nt.id });
  save();
  startNoteEdit(nt.id);
}
function startNoteEdit(id){
  const el = notesLayer.querySelector(`.note[data-id="${id}"] .ntext`);
  if (!el) return;
  editingNoteId = id;
  el.contentEditable = "true";
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = getSelection();
  sel.removeAllRanges(); sel.addRange(range);
}
function finishNoteEdit(commit){
  if (!editingNoteId) return;
  const nt = findNote(editingNoteId);
  const el = notesLayer.querySelector(`.note[data-id="${editingNoteId}"] .ntext`);
  editingNoteId = null;
  if (nt && el){
    const t = el.innerText.replace(/\n+$/, "");
    if (commit && t !== nt.text){ pushUndo(); nt.text = t; }
    el.contentEditable = "false";
  }
  renderAnno(); save();
}
function setArrowMode(on){
  arrowMode = on;
  $("bArrow").classList.toggle("active", on);
  stage.classList.toggle("arrowmode", on);
  if (on && drawMode) setDrawMode(false);
}
function setDrawMode(on){
  drawMode = on;
  $("bDraw").classList.toggle("active", on);
  stage.classList.toggle("drawmode", on);
  if (on && arrowMode) setArrowMode(false);
}

/* ── Zeiger: Auswahl, Ziehen, Pan ── */
let drag = null;
const toWorld = (cx, cy) => {
  const r = stage.getBoundingClientRect();
  return { x: (cx - r.left - view.x) / view.k, y: (cy - r.top - view.y) / view.k };
};
stage.addEventListener("mousedown", e => {
  if (e.button === 1) e.preventDefault(); // Autoscroll des Browsers unterbinden
});
stage.addEventListener("pointerdown", e => {
  if (e.button === 1){
    // Mittlere Maustaste: Fläche verschieben
    e.preventDefault();
    try { stage.setPointerCapture(e.pointerId); } catch(err){}
    drag = { pan: true, startX: e.clientX, startY: e.clientY, vx: view.x, vy: view.y };
    stage.classList.add("panning");
    return;
  }
  if (e.button !== 0) return;
  if (editingId){
    if (e.target.closest(".label,.rank") && e.target.closest(".node")?.dataset.id === editingId) return;
    finishEdit(true);
  }
  if (editingNoteId){
    if (e.target.closest(".ntext") && e.target.closest(".note")?.dataset.id === editingNoteId) return;
    finishNoteEdit(true);
  }
  try { stage.setPointerCapture(e.pointerId); } catch(err){}
  const w = toWorld(e.clientX, e.clientY);

  if (drawMode){
    drag = { draw: true, pts: [[w.x, w.y]] };
    return;
  }
  if (arrowMode){
    const srcEl = e.target.closest(".node, .note");
    if (!srcEl){
      setArrowMode(false);
      drag = null;
      return;
    }
    drag = { bind: { type: srcEl.classList.contains("node") ? "node" : "note", id: srcEl.dataset.id }, cur: w };
    renderAnno();
    return;
  }
  const handle = e.target.closest(".handle");
  if (handle){
    if (handle.dataset.end === "from" || handle.dataset.end === "to"){
      // Endpunkt eines gebundenen Pfeils: neu verbinden / Anker setzen / Richtung drehen
      drag = { rebind: handle.dataset.id, end: handle.dataset.end, cur: w };
      return;
    }
    pushUndo();
    drag = { arrowEnd: handle.dataset.id, end: handle.dataset.end };
    return;
  }
  const arrowEl = e.target.closest(".arrow");
  if (arrowEl){
    const a = findArrow(arrowEl.dataset.id);
    if (!a) return;
    setAnnoSel({ type: "arrow", id: a.id });
    drag = a.from ? null
      : { arrowMove: a.id, start: w, moved: false,
          orig: a.pts ? { pts: a.pts.map(q => [q[0], q[1]]) } : { ...a } };
    return;
  }
  const noteEl = e.target.closest(".note");
  if (noteEl){
    const id = noteEl.dataset.id;
    const nt = findNote(id);
    const wasSelected = annoSel && annoSel.type === "note" && annoSel.id === id;
    setAnnoSel({ type: "note", id });
    if (e.target.closest(".resize")){
      drag = { noteResize: id, start: w, orig: { ...nt }, moved: false };
    } else {
      drag = { noteMove: id, start: w, orig: { ...nt }, moved: false, wasSelected };
    }
    return;
  }
  const nodeEl = e.target.closest(".node");
  if (nodeEl){
    const id = nodeEl.dataset.id;
    const wasSelected = selectedId === id;
    if (annoSel) setAnnoSel(null);
    select(id);
    drag = { id, startX: e.clientX, startY: e.clientY, moved: false,
             wasSelected, field: e.target.closest("[data-field]")?.dataset.field || "name" };
  } else {
    if (annoSel) setAnnoSel(null);
    drag = { pan: true, startX: e.clientX, startY: e.clientY, vx: view.x, vy: view.y };
    stage.classList.add("panning");
  }
});
stage.addEventListener("pointermove", e => {
  if (!drag) return;
  if (drag.pan){
    view.x = drag.vx + (e.clientX - drag.startX);
    view.y = drag.vy + (e.clientY - drag.startY);
    applyView();
    return;
  }
  if (drag.bind || drag.rebind || drag.draw || drag.arrowEnd || drag.arrowMove || drag.noteMove || drag.noteResize){
    const w = toWorld(e.clientX, e.clientY);
    if (drag.bind || drag.rebind){
      drag.cur = w;
      renderAnno();
      nodesEl.querySelectorAll(".droptarget").forEach(el => el.classList.remove("droptarget"));
      const over = document.elementsFromPoint(e.clientX, e.clientY)
        .find(el => el.classList?.contains("node") || el.classList?.contains("note"));
      if (over && (!drag.bind || over.dataset.id !== drag.bind.id)) over.classList.add("droptarget");
      return;
    }
    if (drag.draw){
      const last = drag.pts[drag.pts.length - 1];
      if (Math.hypot(w.x - last[0], w.y - last[1]) > 4) drag.pts.push([w.x, w.y]);
      renderAnno();
      return;
    }
    if (drag.arrowEnd){
      const a = findArrow(drag.arrowEnd);
      if (drag.end === "1"){ a.x1 = w.x; a.y1 = w.y; } else { a.x2 = w.x; a.y2 = w.y; }
      renderAnno(); return;
    }
    const dx = w.x - drag.start.x, dy = w.y - drag.start.y;
    if (!drag.moved && Math.hypot(dx * view.k, dy * view.k) > 4){ drag.moved = true; pushUndo(); }
    if (!drag.moved) return;
    if (drag.arrowMove){
      const a = findArrow(drag.arrowMove), o = drag.orig;
      if (a.pts){
        a.pts = o.pts.map(q => [q[0] + dx, q[1] + dy]);
      } else {
        a.x1 = o.x1 + dx; a.y1 = o.y1 + dy; a.x2 = o.x2 + dx; a.y2 = o.y2 + dy;
      }
    } else if (drag.noteMove){
      const nt = findNote(drag.noteMove);
      nt.x = drag.orig.x + dx; nt.y = drag.orig.y + dy;
    } else {
      const nt = findNote(drag.noteResize);
      nt.w = Math.max(70, drag.orig.w + dx);
      nt.h = Math.max(34, drag.orig.h + dy);
    }
    renderAnno(); return;
  }
  // Karten-Drag: Karte samt Zweig wandert live mit der Maus
  if (!drag.moved && Math.hypot(e.clientX - drag.startX, e.clientY - drag.startY) > 6){
    drag.moved = true;
    const n = findNode(drag.id);
    drag.moveIds = [];
    (function collect(x){
      drag.moveIds.push(x.id);
      if (!x.collapsed) x.children.forEach(collect);
    })(n);
    nodesEl.querySelector(`.node[data-id="${drag.id}"]`)?.classList.add("dragging");
  }
  if (drag.moved){
    const dx = (e.clientX - drag.startX) / view.k, dy = (e.clientY - drag.startY) / view.k;
    drag.moveIds.forEach(id => {
      const el = nodesEl.querySelector(`.node[data-id="${id}"]`);
      if (el) el.style.transform = `translate(${dx}px, ${dy}px)`;
    });
    const over = document.elementsFromPoint(e.clientX, e.clientY)
      .find(el => el.classList?.contains("node") && !drag.moveIds.includes(el.dataset.id));
    nodesEl.querySelectorAll(".droptarget").forEach(el => el.classList.remove("droptarget"));
    if (over){
      const dragged = findNode(drag.id);
      if (!isDescendant(over.dataset.id, dragged)) over.classList.add("droptarget");
    }
  }
});
stage.addEventListener("pointerup", e => {
  stage.classList.remove("panning");
  if (!drag) return;
  const d = drag; drag = null;
  ghost.style.display = "none";
  if (d.pan){ save(); return; }
  if (d.bind){
    nodesEl.querySelectorAll(".droptarget").forEach(el => el.classList.remove("droptarget"));
    const over = document.elementsFromPoint(e.clientX, e.clientY)
      .find(el => el.classList?.contains("node") || el.classList?.contains("note"));
    if (over && over.dataset.id !== d.bind.id){
      pushUndo();
      const a = { id: uid(), from: d.bind,
                  to: { type: over.classList.contains("node") ? "node" : "note", id: over.dataset.id } };
      arrows.push(a);
      setAnnoSel({ type: "arrow", id: a.id });
      save();
    }
    setArrowMode(false);
    renderAnno(); return;
  }
  if (d.rebind){
    nodesEl.querySelectorAll(".droptarget").forEach(el => el.classList.remove("droptarget"));
    const a = findArrow(d.rebind);
    if (a && a.from){
      const endKey = d.end === "from" ? "from" : "to";
      const anchorKey = d.end === "from" ? "fromAnchor" : "toAnchor";
      const own = a[endKey], other = a[endKey === "from" ? "to" : "from"];
      const w2 = toWorld(e.clientX, e.clientY);
      const over = document.elementsFromPoint(e.clientX, e.clientY)
        .find(el => el.classList?.contains("node") || el.classList?.contains("note"));
      if (over && over.dataset.id === other.id){
        // Auf das andere Ende gezogen: Pfeilrichtung umdrehen
        pushUndo();
        const f = a.from; a.from = a.to; a.to = f;
        const fa = a.fromAnchor; a.fromAnchor = a.toAnchor; a.toAnchor = fa;
        if (!a.fromAnchor) delete a.fromAnchor;
        if (!a.toAnchor) delete a.toAnchor;
      } else if (over && over.dataset.id !== own.id){
        // Auf ein anderes Element gezogen: Ende dorthin umbinden
        pushUndo();
        a[endKey] = { type: over.classList.contains("node") ? "node" : "note", id: over.dataset.id };
        delete a[anchorKey];
      } else {
        // In der Nähe des eigenen Elements abgelegt: Ankerpunkt am Rand fixieren
        const rect = anchorRect(own);
        if (rect && w2.x > rect.x - 30 && w2.x < rect.x + rect.w + 30 &&
            w2.y > rect.y - 30 && w2.y < rect.y + rect.h + 30){
          pushUndo();
          a[anchorKey] = projectToBorder(rect, w2.x, w2.y);
        }
      }
    }
    renderAnno(); save();
    return;
  }
  if (d.draw){
    let len = 0;
    for (let i = 1; i < d.pts.length; i++)
      len += Math.hypot(d.pts[i][0] - d.pts[i-1][0], d.pts[i][1] - d.pts[i-1][1]);
    if (d.pts.length > 2 && len > 24){
      pushUndo();
      const a = { id: uid(), style: "draw", pts: d.pts };
      arrows.push(a);
      setAnnoSel({ type: "arrow", id: a.id });
      save();
    }
    setDrawMode(false);
    renderAnno();
    return;
  }
  if (d.arrowEnd || d.arrowMove || d.noteResize){ save(); return; }
  if (d.noteMove){
    if (!d.moved && d.wasSelected && !editingNoteId){ startNoteEdit(d.noteMove); return; }
    save(); return;
  }
  // Karten-Drag beenden
  nodesEl.querySelector(`.node[data-id="${d.id}"]`)?.classList.remove("dragging");
  const target = nodesEl.querySelector(".droptarget");
  nodesEl.querySelectorAll(".droptarget").forEach(el => el.classList.remove("droptarget"));
  if (!d.moved){
    if (d.wasSelected && !editingId) startEdit(d.id, d.field);
    return;
  }
  const dragged = findNode(d.id);
  if (!dragged) return;
  if (target){
    // Auf einer Karte losgelassen: umhängen (auch komplette Strukturen)
    const newParent = findNode(target.dataset.id);
    if (newParent && !isDescendant(newParent.id, dragged)){
      pushUndo();
      if (isRoot(d.id)){
        forest.splice(forest.findIndex(t => t.id === d.id), 1);
        delete dragged.dir;
      } else {
        const oldParent = findParent(d.id);
        oldParent.children = oldParent.children.filter(c => c.id !== d.id);
      }
      dragged.ox = 0; dragged.oy = 0;
      newParent.collapsed = false;
      newParent.children.push(dragged);
      render(); save();
      select(d.id);
    } else {
      // Ungültiges Ziel: Live-Verschiebung zurücknehmen
      (d.moveIds || []).forEach(id => {
        const el = nodesEl.querySelector(`.node[data-id="${id}"]`);
        if (el) el.style.transform = "";
      });
    }
  } else {
    // Ins Leere losgelassen: Karte (samt Zweig) frei verschieben
    pushUndo();
    dragged.ox = (dragged.ox || 0) + (e.clientX - d.startX) / view.k;
    dragged.oy = (dragged.oy || 0) + (e.clientY - d.startY) / view.k;
    render(); save();
    select(d.id);
  }
});
stage.addEventListener("pointercancel", () => {
  stage.classList.remove("panning");
  ghost.style.display = "none";
  nodesEl.querySelectorAll(".dragging,.droptarget").forEach(el =>
    el.classList.remove("dragging","droptarget"));
  nodesEl.querySelectorAll(".node").forEach(el => { el.style.transform = ""; });
  drag = null;

nodesEl.addEventListener("dblclick", e => {
  const el = e.target.closest(".node");
  if (el) startEdit(el.dataset.id, e.target.closest("[data-field]")?.dataset.field);
});
stage.addEventListener("wheel", e => {
  e.preventDefault();
  const k2 = Math.min(2.5, Math.max(0.12, view.k * (e.deltaY < 0 ? 1.12 : 1/1.12)));
  const r = stage.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  view.x = mx - (mx - view.x) * (k2 / view.k);
  view.y = my - (my - view.y) * (k2 / view.k);
  view.k = k2;
  applyView(); save();
}, { passive: false });

/* ── Tastatur ── */
document.addEventListener("keydown", e => {
  if (editingNoteId){
    if (e.key === "Escape"){ e.preventDefault(); finishNoteEdit(true); }
    return;
  }
  if (editingId){
    if (e.key === "Enter"){ e.preventDefault(); finishEdit(true); }
    else if (e.key === "Escape"){ e.preventDefault(); finishEdit(false); }
    else if (e.key === "Tab"){
      e.preventDefault();
      const order = ["title","name","ptitle","pname"].filter(f => fieldEl(editingId, f));
      const i = order.findIndex(f => document.activeElement === fieldEl(editingId, f));
      if (i >= 0 && i < order.length - 1) focusField(editingId, order[i + 1]);
      else finishEdit(true);
    }
    return;
  }
  if (e.target instanceof Element && e.target.closest("input,button")) {
    if (e.key !== "Tab") return;
  }
  if (e.key === "Tab"){ e.preventDefault(); if (e.shiftKey) addParent(); else addChild(); }
  else if (e.key === "Enter"){ e.preventDefault(); addSibling(); }
  else if (e.key === "Delete" || e.key === "Backspace"){ e.preventDefault(); if (annoSel) deleteAnno(); else deleteSelected(); }
  else if (e.key === "F2"){ e.preventDefault(); if (selectedId) startEdit(selectedId, "title"); }
  else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z"){ e.preventDefault(); undo(); }
});

/* ── Import ── */
function applyImport(text){
  try {
    const data = JSON.parse(text);
    if (data && data.version === 2 && Array.isArray(data.docs) && data.docs.length){
      // Komplette Arbeitsmappe ersetzen
      data.docs.forEach(d => {
        d.forest = Array.isArray(d.forest) ? d.forest : [];
        if (!d.forest.length) d.forest = [mkNode("Anführer", "Name")];
        d.forest.forEach(t => { fixTree(t); migrate(t); });
        d.notes = Array.isArray(d.notes) ? d.notes : [];
        d.arrows = Array.isArray(d.arrows) ? d.arrows : [];
        d.view = d.view || { x: 60, y: 60, k: 1 };
        d.name = d.name || "Struktur";
        d.id = d.id || uid();
      });
      docs = data.docs;
      undoStack = [];
      $("bUndo").disabled = true;
      activate(Math.min(data.active || 0, docs.length - 1));
      save(); fitView();
      return;
    }
    // Alte Formate: einzelner Baum ({root,notes,arrows} oder Baum direkt) -> aktuellen Tab ersetzen
    let tree = data && data.root ? data.root : data;
    const newNotes = data && Array.isArray(data.notes) ? data.notes : [];
    const newArrows = data && Array.isArray(data.arrows) ? data.arrows : [];
    if (!tree || (typeof tree.name !== "string" && typeof tree.text !== "string") || !Array.isArray(tree.children))
      throw new Error("format");
    pushUndo();
    fixTree(tree); migrate(tree);
    docs[docIdx].forest = forest = [tree];
    docs[docIdx].notes = notes = newNotes;
    docs[docIdx].arrows = arrows = newArrows;
    setAnnoSel(null);
    selectedId = tree.id;
    render(); save(); fitView();
  } catch(err) {
    alert("Die Datei ist keine gültige Rangstruktur-JSON. Erwartet wird ein Export aus diesem Programm.");
  }
}
function fixTree(n){
  n.id = n.id || uid();
  n.collapsed = !!n.collapsed;
  n.children = Array.isArray(n.children) ? n.children : [];
  n.children.forEach(fixTree);
}

/* ── PNG-Export (aktueller Tab) ── */
function roundRect(ctx, x, y, w, h, r){
  if (ctx.roundRect){ ctx.roundRect(x, y, w, h, r); return; }
  const rr = Array.isArray(r) ? r[0] : r;
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}
function wrapText(ctx, text, maxW){
  const lines = [];
  for (const raw of String(text).split("\n")){
    const words = raw.split(/\s+/).filter(Boolean);
    if (!words.length){ lines.push(""); continue; }
    let cur = "";
    for (const word of words){
      const test = cur ? cur + " " + word : word;
      if (cur && ctx.measureText(test).width > maxW){ lines.push(cur); cur = word; }
      else cur = test;
    }
    lines.push(cur);
  }
  return lines;
}
function drawArrowHead(ctx, x, y, ux, uy, color){
  const head = 11, hw = 4.5;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - ux * head - uy * hw, y - uy * head + ux * hw);
  ctx.lineTo(x - ux * head + uy * hw, y - uy * head - ux * hw);
  ctx.closePath();
  ctx.fill();
}
function exportPng(){
  const cs = getComputedStyle(document.documentElement);
  const v = name => cs.getPropertyValue(name).trim();
  const FONT = 'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif';

  const depthOf = new Map();
  forest.forEach(tree => {
    (function walk(n, d){
      depthOf.set(n.id, d);
      if (!n.collapsed) n.children.forEach(c => walk(c, d + 1));
    })(tree, 0);
  });

  const b = contentBounds();
  if (!b) return;
  const pad = 40, scale = 2;
  const W = b.maxX - b.minX + 2 * pad, H = b.maxY - b.minY + 2 * pad;
  const canvas = document.createElement("canvas");
  canvas.width = Math.round(W * scale);
  canvas.height = Math.round(H * scale);
  const ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);
  ctx.fillStyle = v("--bg");
  ctx.fillRect(0, 0, W, H);
  ctx.translate(pad - b.minX, pad - b.minY);
  ctx.textBaseline = "top";

  // 1) Verbinder
  ctx.strokeStyle = v("--edge");
  ctx.lineWidth = 1.5;
  forest.forEach(tree => {
    const up = tree.dir === "up";
    (function edges(n){
      if (n.collapsed) return;
      const p = nodeRects.get(n.id);
      n.children.forEach(c => {
        const q = nodeRects.get(c.id);
        if (p && q){
          const frac = n.partner ? (c.of === "a" ? 0.25 : c.of === "b" ? 0.75 : 0.5) : 0.5;
          const x1 = p.x + p.w * frac, x2 = q.x + q.w / 2;
          const y1 = up ? p.y : p.y + p.h;
          const y2 = up ? q.y + q.h : q.y;
          const my = y1 + (y2 - y1) / 2;
          ctx.beginPath();
          ctx.moveTo(x1, y1); ctx.lineTo(x1, my); ctx.lineTo(x2, my); ctx.lineTo(x2, y2);
          ctx.stroke();
        }
        edges(c);
      });
    })(tree);
  });

  // 2) Namenskarten
  nodeRects.forEach((r, id) => {
    const n = findNode(id);
    if (!n) return;
    const lvlColor = v("--lvl" + (depthOf.get(id) % 6)) || v("--accent");
    ctx.fillStyle = v("--surface");
    ctx.strokeStyle = v("--line");
    ctx.lineWidth = 1;
    ctx.beginPath(); roundRect(ctx, r.x, r.y, r.w, r.h, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle = lvlColor;
    ctx.beginPath(); roundRect(ctx, r.x, r.y, 4, r.h, [6, 0, 0, 6]); ctx.fill();
    const halfW = (r.w - 5) / 2;
    const persons = n.partner
      ? [[n.title, n.name, r.x + 16], [n.partner.title, n.partner.name, r.x + 4 + halfW + 13]]
      : [[n.title, n.name, r.x + 16]];
    const colW = n.partner ? halfW - 24 : r.w - 28;
    if (n.partner){
      ctx.strokeStyle = v("--line");
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(r.x + 4 + halfW + 0.5, r.y + 6);
      ctx.lineTo(r.x + 4 + halfW + 0.5, r.y + r.h - 6);
      ctx.stroke();
    }
    persons.forEach(([pt, pn, tx]) => {
      ctx.fillStyle = lvlColor;
      ctx.font = "700 9.5px " + FONT;
      try { ctx.letterSpacing = "1px"; } catch(err){}
      ctx.fillText(pt.toUpperCase(), tx, r.y + 9);
      try { ctx.letterSpacing = "0px"; } catch(err){}
      ctx.fillStyle = v("--ink");
      ctx.font = "600 13.5px " + FONT;
      wrapText(ctx, pn, colW).forEach((line, i) => {
        ctx.fillText(line, tx, r.y + 23 + i * 17.5);
      });
    });
  });

  // 3) Textfelder (mit gewählter Farbe)
  notes.forEach(nt => {
    const col = nt.c != null ? v("--nc" + nt.c) : null;
    ctx.fillStyle = v("--surface");
    ctx.strokeStyle = col || v("--edge");
    ctx.lineWidth = 1;
    ctx.setLineDash(col ? [] : [5, 4]);
    ctx.beginPath(); roundRect(ctx, nt.x, nt.y, nt.w, nt.h, 6); ctx.fill();
    if (col){
      ctx.save();
      ctx.globalAlpha = 0.14;
      ctx.fillStyle = col;
      ctx.beginPath(); roundRect(ctx, nt.x, nt.y, nt.w, nt.h, 6); ctx.fill();
      ctx.restore();
    }
    ctx.beginPath(); roundRect(ctx, nt.x, nt.y, nt.w, nt.h, 6); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = v("--ink");
    ctx.font = "400 13px " + FONT;
    const maxLines = Math.max(1, Math.floor((nt.h - 16) / 18.2));
    wrapText(ctx, nt.text, nt.w - 30).slice(0, maxLines).forEach((line, i) => {
      ctx.fillText(line, nt.x + 10, nt.y + 9 + i * 18.2);
    });
  });

  // 4) Pfeile
  const accent = v("--accent");
  arrowShapes().forEach(s => {
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.pts[0][0], s.pts[0][1]);
    for (let i = 1; i < s.pts.length; i++) ctx.lineTo(s.pts[i][0], s.pts[i][1]);
    ctx.stroke();
    const L = s.pts.length;
    if (s.headEnd && L > 1){
      const [ax, ay] = s.pts[L-2], [bx, by] = s.pts[L-1];
      const dl = Math.hypot(bx - ax, by - ay) || 1;
      drawArrowHead(ctx, bx, by, (bx - ax) / dl, (by - ay) / dl, accent);
    }
    if (s.headStart && L > 1){
      const [ax, ay] = s.pts[1], [bx, by] = s.pts[0];
      const dl = Math.hypot(bx - ax, by - ay) || 1;
      drawArrowHead(ctx, bx, by, (bx - ax) / dl, (by - ay) / dl, accent);
    }
  });

  const dataUrl = canvas.toDataURL("image/png");
  const api = hostApi();
  if (api){ api.export_png(dataUrl).catch(() => alert("PNG-Export fehlgeschlagen.")); return; }
  const link = document.createElement("a");
  link.href = dataUrl;
  link.download = "rangstruktur.png";
  link.click();
}

/* ── Toolbar ── */
$("bAddChild").addEventListener("click", addChild);
$("bAddParent").addEventListener("click", addParent);
$("bAddSib").addEventListener("click", addSibling);
$("bPartner").addEventListener("click", togglePartner);
$("bDelete").addEventListener("click", () => { if (annoSel) deleteAnno(); else deleteSelected(); });
$("bAddTree").addEventListener("click", addTree);
$("bFlip").addEventListener("click", flipTree);
$("bNote").addEventListener("click", addNote);
$("bArrow").addEventListener("click", () => setArrowMode(!arrowMode));
$("bDraw").addEventListener("click", () => setDrawMode(!drawMode));
document.querySelectorAll("#childOf .mini").forEach(b => {
  b.addEventListener("click", () => {
    const n = selectedId ? findNode(selectedId) : null;
    if (!n) return;
    pushUndo();
    if (b.dataset.of) n.of = b.dataset.of; else delete n.of;
    render(); save();
  });
});
$("bUndo").addEventListener("click", undo);
$("bFit").addEventListener("click", fitView);
$("bPng").addEventListener("click", exportPng);
$("bNewTab").addEventListener("click", () => {
  docs.push(mkDoc("Struktur " + (docs.length + 1)));
  activate(docs.length - 1);
  save();
});
document.querySelectorAll("#arrowOpts .mini[data-style]").forEach(b => {
  b.addEventListener("click", () => {
    const a = annoSel && annoSel.type === "arrow" ? findArrow(annoSel.id) : null;
    if (!a) return;
    pushUndo();
    a.style = b.dataset.style;
    updateArrowOpts(); renderAnno(); save();
  });
});
$("bBoth").addEventListener("click", () => {
  const a = annoSel && annoSel.type === "arrow" ? findArrow(annoSel.id) : null;
  if (!a) return;
  pushUndo();
  a.both = !a.both;
  updateArrowOpts(); renderAnno(); save();
});
document.querySelectorAll("#palette .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    if (!annoSel || annoSel.type !== "note") return;
    const nt = findNote(annoSel.id);
    if (!nt) return;
    pushUndo();
    if (chip.dataset.c === "") delete nt.c;
    else nt.c = +chip.dataset.c;
    renderAnno(); save();
  });
});
$("bNew").addEventListener("click", () => {
  if (!confirm(`Tab "${docs[docIdx].name}" leeren und neu beginnen?`)) return;
  pushUndo();
  const r = mkNode("Anführer", "Name");
  docs[docIdx].forest = forest = [r];
  docs[docIdx].notes = notes = [];
  docs[docIdx].arrows = arrows = [];
  setAnnoSel(null);
  selectedId = r.id;
  render(); save(); fitView();
});
$("bExport").addEventListener("click", () => {
  const text = JSON.stringify({ version: 2, active: docIdx, docs }, null, 2);
  const api = hostApi();
  if (api){ api.export_json(text).catch(() => alert("Export fehlgeschlagen.")); return; }
  const a = document.createElement("a");
  a.href = "data:application/json;charset=utf-8," + encodeURIComponent(text);
  a.download = "rangstruktur.json";
  a.click();
});
$("bImport").addEventListener("click", () => {
  const api = hostApi();
  if (api){
    api.import_json().then(text => { if (text != null) applyImport(text); })
      .catch(() => alert("Import fehlgeschlagen."));
    return;
  }
  $("fileIn").click();
});
$("fileIn").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const rd = new FileReader();
  rd.onload = () => applyImport(rd.result);
  rd.readAsText(f);
  e.target.value = "";
});

/* ── Start ── */
async function init(){
  let raw = null;
  const api = hostApi();
  try {
    raw = api ? await api.load_data() : localStorage.getItem(STORE_KEY);
    if (!raw && !api) raw = localStorage.getItem(OLD_KEY);
  } catch(e){}
  let hadData = false;
  try {
    if (raw){
      const data = JSON.parse(raw);
      if (data.version === 2 && Array.isArray(data.docs) && data.docs.length){
        docs = data.docs;
        docIdx = Math.min(data.active || 0, docs.length - 1);
        hadData = true;
      } else if (data.root){
        // Altes Ein-Struktur-Format übernehmen
        const d = mkDoc("Struktur 1");
        d.forest = [data.root];
        d.notes = Array.isArray(data.notes) ? data.notes : [];
        d.arrows = Array.isArray(data.arrows) ? data.arrows : [];
        if (data.view) d.view = data.view;
        docs = [d];
        docIdx = 0;
        hadData = true;
      }
    }
  } catch(e){}
  if (!docs.length){ docs = [defaultDoc()]; docIdx = 0; }
  docs.forEach(d => {
    d.forest = Array.isArray(d.forest) ? d.forest : [];
    if (!d.forest.length) d.forest = [mkNode("Anführer", "Name")];
    d.forest.forEach(t => { fixTree(t); migrate(t); });
    d.notes = Array.isArray(d.notes) ? d.notes : [];
    d.arrows = Array.isArray(d.arrows) ? d.arrows : [];
    d.view = d.view || { x: 60, y: 60, k: 1 };
  });
  $("bUndo").disabled = true;
  activate(docIdx);
  if (!hadData) fitView();
  window.addEventListener("resize", applyView);
}
if (window.pywebview) init();
else {
  let started = false;
  const go = () => { if (!started){ started = true; init(); } };
  window.addEventListener("pywebviewready", go);
  setTimeout(go, 700);
}
